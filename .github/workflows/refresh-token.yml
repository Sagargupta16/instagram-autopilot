name: Refresh Instagram Token

on:
  schedule:
    # Run on the 1st and 15th of each month (tokens expire in 60 days)
    - cron: "0 12 1,15 * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Refresh long-lived token
        id: refresh
        run: |
          RESPONSE=$(curl -s "https://graph.facebook.com/v21.0/oauth/access_token?\
          grant_type=fb_exchange_token&\
          client_id=${{ secrets.META_APP_ID }}&\
          client_secret=${{ secrets.META_APP_SECRET }}&\
          fb_exchange_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")

          NEW_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

          if [ "$NEW_TOKEN" = "null" ] || [ -z "$NEW_TOKEN" ]; then
            echo "Token refresh failed: $RESPONSE"
            exit 1
          fi

          echo "Token refreshed successfully"
          echo "new_token=$NEW_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Update secret with new token
        run: |
          echo "${{ steps.refresh.outputs.new_token }}" | gh secret set INSTAGRAM_ACCESS_TOKEN --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_SECRETS }}
