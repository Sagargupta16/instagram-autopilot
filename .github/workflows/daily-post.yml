name: Daily Instagram + X Post

on:
  schedule:
    # Mon-Sat 3:30 AM UTC (9:00 AM IST)
    - cron: "30 3 * * 1-6"
  workflow_dispatch: # Manual trigger for testing

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and publish post
        run: python -m src.main
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          S3_VIDEO_BUCKET: ${{ secrets.S3_VIDEO_BUCKET }}
          NICHE: ${{ vars.NICHE || 'psychology_facts' }}
          CONTENT_TYPES: ${{ vars.CONTENT_TYPES || 'fact,tip' }}
