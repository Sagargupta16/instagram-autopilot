name: Daily Instagram Post

on:
  schedule:
    # Fires at 15:30 UTC (start of US lunch engagement window:
    # 10:30 AM EST / 11:30 AM EDT / 9:00 PM IST). The bot then sleeps
    # a random 0-180 min via POST_JITTER_MAX_MINUTES so the actual post
    # time lands somewhere in the 3-hour peak window and does not look
    # cron-scheduled.
    - cron: "30 15 * * *"
  workflow_dispatch:
    inputs:
      force_jitter:
        description: "Apply 0-180 min jitter on manual run (normally skipped)"
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and publish post
        run: python -m src.main
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_CONNECTED_ACCOUNT_ID: ${{ secrets.COMPOSIO_CONNECTED_ACCOUNT_ID }}
          COMPOSIO_USER_ID: ${{ secrets.COMPOSIO_USER_ID }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          S3_VIDEO_BUCKET: ${{ secrets.S3_VIDEO_BUCKET }}
          NICHE: ${{ vars.NICHE || 'ai_creativity_and_prompts' }}
          CONTENT_TYPES: ${{ vars.CONTENT_TYPES || 'tip,trick,showcase,tutorial,insight' }}
          # Schedule runs always jitter; manual runs skip unless force_jitter is checked.
          POST_JITTER_MAX_MINUTES: ${{ (github.event_name == 'schedule' || inputs.force_jitter) && (vars.POST_JITTER_MAX_MINUTES || '180') || '0' }}
